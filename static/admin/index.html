<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>STRATECO · Redaktion</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <style>
      /* Decap CMS bringt seine eigene helle UI mit. Wir resetten nur Margins
         und sorgen für einen neutral-hellen Body-Hintergrund, damit beim
         Scrollen unten kein dunkler Streifen vom Site-Theme auftaucht. */
      html, body {
        margin: 0;
        padding: 0;
        background: #f7f7f5;
        color: #0a1517;
        min-height: 100dvh;
      }
    </style>
  </head>
  <body>
    <!-- Decap CMS — vollständige Redaktions-Oberfläche.
         Konfiguration in config.yml; Auth läuft über die Netlify Function
         in netlify/functions/oauth.mts (Schritte siehe GITHUB_OAUTH_SETUP.md). -->
    <script src="https://unpkg.com/decap-cms@^3.6.0/dist/decap-cms.js"></script>
  </body>
</html>
